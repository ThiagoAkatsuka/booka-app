<ion-content class="premium-bg" [fullscreen]="true">
  <!-- Fundo animado -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="glass-container" style="padding-top: 48px; padding-bottom: 48px;">
    <div class="premium-glass-card">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px;">
        <button (click)="goBack()" type="button" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); cursor: pointer; transition: background 0.2s;">
          <ion-icon name="arrow-back-outline" style="font-size: 20px;"></ion-icon>
        </button>
        <img src="assets/logo.jpeg" alt="Booka" class="premium-logo" style="margin: 0;" />
        <div style="width: 44px;"></div>
      </div>

      <h1 class="premium-title">Criar Conta</h1>

      <div class="premium-input-group">
        <label class="premium-label">Nome</label>
        <ion-input class="premium-input" type="text" placeholder="Tiago" [(ngModel)]="firstName"></ion-input>
      </div>

      <div class="premium-input-group">
        <label class="premium-label">Sobrenome</label>
        <ion-input class="premium-input" type="text" placeholder="Brum" [(ngModel)]="lastName"></ion-input>
      </div>

      <div class="premium-input-group">
        <label class="premium-label">E-mail</label>
        <ion-input class="premium-input" type="email" placeholder="exemplo@email.com" [(ngModel)]="email"></ion-input>
      </div>

      <div class="premium-input-group">
        <label class="premium-label">Senha</label>
        <div style="position: relative;">
          <ion-input class="premium-input" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••" [(ngModel)]="password"></ion-input>
          <button class="premium-eye-btn" (click)="showPassword = !showPassword" type="button" style="position: absolute; right: 0; top: 0; bottom: 0;">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </div>

      <div class="premium-input-group">
        <label class="premium-label">Confirmar senha</label>
        <div style="position: relative;">
          <ion-input class="premium-input" [type]="showConfirm ? 'text' : 'password'" placeholder="••••••••" [(ngModel)]="confirmPassword"></ion-input>
          <button class="premium-eye-btn" (click)="showConfirm = !showConfirm" type="button" style="position: absolute; right: 0; top: 0; bottom: 0;">
            <ion-icon [name]="showConfirm ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </div>

      <ion-button expand="block" class="premium-btn" (click)="signUp()" style="margin-top: 32px;">Cadastrar</ion-button>

      <div class="premium-divider">
        <span>ou continue com</span>
      </div>

      <div class="social-login-group">
        <button class="social-btn google-btn" type="button">
          <ion-icon name="logo-google"></ion-icon> Google
        </button>
        <button class="social-btn apple-btn" type="button">
          <ion-icon name="logo-apple"></ion-icon> Apple
        </button>
      </div>

      <p class="premium-footer-text">
        Já tem uma conta? <a routerLink="/login" class="premium-link-bold">Entrar</a>
      </p>
    </div>
  </div>
</ion-content>
