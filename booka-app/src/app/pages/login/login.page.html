<ion-content class="premium-bg" [fullscreen]="true">
  <!-- Fundo animado - Orbes de neon -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Cartão de Vidro (Glassmorphism) -->
  <div class="glass-container">
    <div class="premium-glass-card">
      <div class="premium-logo-wrap">
        <img src="assets/logo.jpeg" alt="Booka" class="premium-logo" />
      </div>

      <h1 class="premium-title">Entrar</h1>
      <p class="premium-subtitle">Conecte-se com pessoas e eventos ao seu redor.</p>

      <div class="premium-input-group">
        <label class="premium-label">E-mail</label>
        <ion-input class="premium-input" type="email" placeholder="exemplo@email.com" [(ngModel)]="email"></ion-input>
      </div>

      <div class="premium-input-group">
        <label class="premium-label">Senha</label>
        <div style="position: relative;">
          <ion-input class="premium-input" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••" [(ngModel)]="password"></ion-input>
          <button class="premium-eye-btn" (click)="showPassword = !showPassword" type="button" style="position: absolute; right: 0; top: 0; bottom: 0;">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </div>

      <div class="premium-forgot-wrapper">
        <a routerLink="/esqueci-senha" class="premium-link">Esqueci minha senha</a>
      </div>

      <ion-button expand="block" class="premium-btn" (click)="signIn()">Entrar</ion-button>

      <p class="premium-footer-text">
        Não tem uma conta? <a routerLink="/cadastro" class="premium-link-bold">Cadastre-se</a>
      </p>
    </div>
  </div>
</ion-content>
