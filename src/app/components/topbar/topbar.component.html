<header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-10 shrink-0">
  <div class="flex-1 max-w-xl">
    <div class="relative group">
      <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-slate-400 group-focus-within:text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </span>
      <input class="block w-full pl-10 pr-3 py-2 border-none rounded-lg bg-slate-100 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none" placeholder="Pesquisar agendamento ou cliente..." type="text">
    </div>
  </div>
  
  <div class="flex items-center gap-6 ml-4">
    <button class="relative p-2 text-slate-500 hover:bg-slate-100 rounded-full transition-colors">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
      <span class="absolute top-2 right-2.5 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
    </button>
    
    <div class="relative group cursor-pointer border-l border-slate-200 pl-6">
      
      <div class="flex items-center gap-3">
        <div class="text-right">
          <p class="text-sm font-semibold text-slate-700 leading-tight">Admin - Loja Centro</p>
          <p class="text-xs text-slate-500">Administrador</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-indigo-100 border-2 border-indigo-200 flex items-center justify-center overflow-hidden transition-transform group-hover:scale-105">
          <span class="text-indigo-600 font-bold text-sm">LC</span>
        </div>
      </div>

      <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-slate-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50 transform origin-top-right group-hover:translate-y-1">
        <div class="p-2 space-y-1">
          <a routerLink="/perfil" class="flex items-center gap-2 px-3 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-indigo-600 rounded-lg transition-colors">
            <span class="material-symbols-outlined text-lg">person</span>
            Meu Perfil
          </a>
          <a routerLink="/configuracoes" class="flex items-center gap-2 px-3 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-indigo-600 rounded-lg transition-colors">
            <span class="material-symbols-outlined text-lg">settings</span>
            Configurações
          </a>
          <div class="h-px bg-slate-100 my-1"></div>
          
          <a routerLink="/login" class="flex items-center gap-2 px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors">
            <span class="material-symbols-outlined text-lg">logout</span>
            Sair da Conta
          </a>
          
        </div>
      </div>

    </div>
  </div>
</header>
