<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title><span class="font-bold text-slate-900">Bloqueios</span></ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="px-4 pt-4 pb-6">
    <p class="text-sm text-slate-500 mb-4">Bloqueie períodos em que você não está disponível para atendimento.</p>

    <!-- Placeholder - empty state -->
    <div class="flex flex-col items-center justify-center h-48 gap-3 text-center">
      <div class="w-14 h-14 rounded-full bg-amber-50 flex items-center justify-center">
        <ion-icon name="lock-closed-outline" class="text-3xl text-amber-400"></ion-icon>
      </div>
      <p class="font-semibold text-slate-700">Nenhum bloqueio ativo</p>
      <p class="text-sm text-slate-500">Adicione um bloqueio de horário para almoço, férias ou folga.</p>
    </div>
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button color="warning">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
