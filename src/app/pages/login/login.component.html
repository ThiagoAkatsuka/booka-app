<ion-content [fullscreen]="true" class="ion-padding">

  <!-- Logo + Header -->
  <div class="flex flex-col items-center pt-12 pb-8">
    <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-indigo-600 shadow-lg shadow-indigo-200 mb-4">
      <svg class="w-10 h-10" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(8, 8)">
          <path clip-rule="evenodd" d="M24 4H42V17.3333V30.6667H24V44H6V30.6667V17.3333H24V4Z" fill="#FFFFFF" fill-rule="evenodd"></path>
        </g>
      </svg>
    </div>
    <h1 class="text-2xl font-black tracking-tight text-slate-900">Entrar no Booka</h1>
    <p class="mt-1 text-sm text-slate-500 text-center px-4">Bem-vindo de volta! Acesse seu painel.</p>
  </div>

  <!-- Form Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-4">

    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">E-mail</label>
      <input
        [(ngModel)]="email"
        type="email"
        name="email"
        placeholder="seu@email.com"
        autocomplete="email"
        class="block w-full rounded-xl border border-slate-200 bg-slate-50 py-3 px-4 text-slate-900 placeholder:text-slate-400 text-sm outline-none"
      />
    </div>

    <div>
      <div class="flex items-center justify-between mb-1.5">
        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide">Senha</label>
        <a routerLink="/recuperar-senha" class="text-xs font-semibold text-indigo-600">Esqueceu?</a>
      </div>
      <input
        [(ngModel)]="password"
        type="password"
        name="password"
        placeholder="••••••••"
        autocomplete="current-password"
        class="block w-full rounded-xl border border-slate-200 bg-slate-50 py-3 px-4 text-slate-900 placeholder:text-slate-400 text-sm outline-none"
      />
    </div>

    <button
      (click)="onSubmit()"
      type="button"
      class="flex w-full justify-center rounded-xl bg-indigo-600 px-4 py-3.5 text-sm font-bold text-white shadow-md shadow-indigo-200 active:scale-95 transition-all mt-2"
    >
      Entrar no Painel
    </button>
  </div>

  <!-- Divisor -->
  <div class="relative my-6">
    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
    <div class="relative flex justify-center text-xs font-medium">
      <span class="bg-slate-50 px-3 text-slate-400">Ou continue com</span>
    </div>
  </div>

  <!-- Social Login -->
  <div class="grid grid-cols-2 gap-3">
    <button type="button" class="flex items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm font-bold text-slate-900 transition-colors">
      <svg class="h-5 w-5" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.65l-3.57-2.77c-.99.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
        <path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.11s.13-1.45.35-2.11V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.83z" fill="#FBBC05"></path>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.83c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
      </svg>
      <span>Google</span>
    </button>
    <button type="button" class="flex items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm font-bold text-slate-900 transition-colors">
      <svg class="h-5 w-5 fill-slate-900" viewBox="0 0 24 24">
        <path d="M17.05 20.28c-.96.95-2.04 1.84-3.4 1.86-1.32.02-1.75-.79-3.27-.79-1.53 0-2 .77-3.25.82-1.33.05-2.54-.95-3.52-2.35-2-2.85-1.53-7.31.43-10.12 1-1.39 2.41-2.27 3.96-2.3 1.17-.02 2.28.79 3 .79.7 0 2.05-.98 3.44-.84 1.45.14 2.58.74 3.3 1.78-2.92 1.76-2.45 5.86.49 7.15-.55 1.41-1.28 2.82-2.2 4zM12.03 5.35c.61-1.39.2-2.92-.48-4.08 1.14.09 2.55.8 3.25 1.93.73 1.15.35 2.85-.35 3.98-1.27.05-2.42-.72-2.42-1.83z"></path>
      </svg>
      <span>Apple</span>
    </button>
  </div>

  <!-- Cadastro Link -->
  <p class="mt-8 text-center text-sm text-slate-500 pb-8">
    Não tem conta?
    <a routerLink="/cadastro" class="font-bold text-indigo-600 ml-1">Criar conta</a>
  </p>

</ion-content>
