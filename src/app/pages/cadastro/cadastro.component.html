<ion-content [fullscreen]="true" class="ion-padding">

  <!-- Logo + Header -->
  <div class="flex flex-col items-center pt-10 pb-6">
    <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-indigo-600 shadow-lg shadow-indigo-200 mb-3">
      <svg class="w-9 h-9" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(8, 8)">
          <path clip-rule="evenodd" d="M24 4H42V17.3333V30.6667H24V44H6V30.6667V17.3333H24V4Z" fill="#FFFFFF" fill-rule="evenodd"></path>
        </g>
      </svg>
    </div>
    <h1 class="text-2xl font-black tracking-tight text-slate-900">Criar sua conta</h1>
    <p class="mt-1 text-sm text-slate-500 text-center">Comece a gerenciar seu negócio hoje.</p>
  </div>

  <!-- Form Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-4">

    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Nome Completo</label>
      <input [(ngModel)]="fullName" type="text" name="fullName" placeholder="Seu nome completo"
        class="block w-full rounded-xl border border-slate-200 bg-slate-50 py-3 px-4 text-sm text-slate-900 placeholder:text-slate-400 outline-none" />
    </div>

    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">E-mail</label>
      <input [(ngModel)]="email" type="email" name="email" placeholder="seu@email.com"
        class="block w-full rounded-xl border border-slate-200 bg-slate-50 py-3 px-4 text-sm text-slate-900 placeholder:text-slate-400 outline-none" />
    </div>

    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Senha</label>
      <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Mínimo 8 caracteres"
        class="block w-full rounded-xl border border-slate-200 bg-slate-50 py-3 px-4 text-sm text-slate-900 placeholder:text-slate-400 outline-none" />
      <!-- Indicadores de força -->
      <div class="flex gap-2 mt-2">
        <div class="h-1 flex-1 rounded-full" [class]="hasMinLength ? 'bg-emerald-500' : 'bg-slate-200'"></div>
        <div class="h-1 flex-1 rounded-full" [class]="hasNumber ? 'bg-emerald-500' : 'bg-slate-200'"></div>
        <div class="h-1 flex-1 rounded-full" [class]="hasSpecialChar ? 'bg-emerald-500' : 'bg-slate-200'"></div>
      </div>
    </div>

    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Confirmar Senha</label>
      <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••••"
        class="block w-full rounded-xl border border-slate-200 bg-slate-50 py-3 px-4 text-sm text-slate-900 placeholder:text-slate-400 outline-none" />
    </div>

    <!-- Tipo de conta -->
    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-2 uppercase tracking-wide">Como usar o Booka?</label>
      <div class="grid grid-cols-2 gap-2">
        <label class="flex cursor-pointer rounded-xl border p-3 transition-all"
          [ngClass]="role === 'CLIENTE' ? 'border-indigo-600 bg-indigo-50' : 'border-slate-200'">
          <input type="radio" name="role" value="CLIENTE" [(ngModel)]="role" class="sr-only">
          <div>
            <span class="block text-xs font-bold text-slate-900">👤 Cliente</span>
            <span class="text-xs text-slate-500">Contratar serviços</span>
          </div>
        </label>
        <label class="flex cursor-pointer rounded-xl border p-3 transition-all"
          [ngClass]="role === 'PROFISSIONAL' ? 'border-indigo-600 bg-indigo-50' : 'border-slate-200'">
          <input type="radio" name="role" value="PROFISSIONAL" [(ngModel)]="role" class="sr-only">
          <div>
            <span class="block text-xs font-bold text-slate-900">✂️ Profissional</span>
            <span class="text-xs text-slate-500">Oferecer serviços</span>
          </div>
        </label>
      </div>
    </div>

    <button (click)="onSubmit()" type="button"
      class="flex w-full justify-center rounded-xl bg-indigo-600 px-4 py-3.5 text-sm font-bold text-white shadow-md shadow-indigo-200 active:scale-95 transition-all mt-2">
      Criar Minha Conta
    </button>
  </div>

  <p class="mt-6 text-center text-sm text-slate-500 pb-8">
    Já tem conta?
    <a routerLink="/login" class="font-bold text-indigo-600 ml-1">Entrar</a>
  </p>

</ion-content>
