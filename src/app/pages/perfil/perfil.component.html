<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title><span class="font-bold text-slate-900">Meu Perfil</span></ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Avatar -->
  <div class="flex flex-col items-center py-8">
    <div class="relative">
      <div class="w-24 h-24 rounded-full bg-gradient-to-br from-indigo-500 to-indigo-700 flex items-center justify-center text-white text-3xl font-black shadow-lg">M</div>
      <button class="absolute bottom-0 right-0 w-8 h-8 bg-white rounded-full shadow-md flex items-center justify-center border border-slate-100">
        <ion-icon name="camera-outline" class="text-slate-600 text-base"></ion-icon>
      </button>
    </div>
    <p class="font-bold text-slate-900 mt-3 text-lg">Meu Perfil</p>
    <p class="text-sm text-slate-500">Profissional</p>
  </div>

  <!-- Info Card -->
  <div class="px-4 space-y-3 pb-8">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="flex items-center gap-3 p-4 border-b border-slate-50">
        <div class="w-9 h-9 rounded-xl bg-indigo-50 flex items-center justify-center shrink-0">
          <ion-icon name="mail-outline" class="text-indigo-600"></ion-icon>
        </div>
        <div class="flex-1">
          <p class="text-xs text-slate-400">E-mail</p>
          <p class="text-sm font-semibold text-slate-900">usuario&#64;email.com</p>
        </div>
        <ion-icon name="pencil-outline" class="text-slate-300"></ion-icon>
      </div>
      <div class="flex items-center gap-3 p-4">
        <div class="w-9 h-9 rounded-xl bg-emerald-50 flex items-center justify-center shrink-0">
          <ion-icon name="call-outline" class="text-emerald-600"></ion-icon>
        </div>
        <div class="flex-1">
          <p class="text-xs text-slate-400">Telefone</p>
          <p class="text-sm font-semibold text-slate-900">(11) 99999-9999</p>
        </div>
        <ion-icon name="pencil-outline" class="text-slate-300"></ion-icon>
      </div>
    </div>
  </div>
</ion-content>
