<div class="bg-slate-50 font-sans text-slate-900 antialiased h-screen flex overflow-hidden">
  
  <app-sidebar></app-sidebar>

  <div class="flex-1 flex flex-col min-w-0">
    
    <app-topbar></app-topbar>

    <main class="flex-1 overflow-y-auto p-8 space-y-8">
      
      <div class="w-full">
        
        <a routerLink="/configuracoes" class="inline-flex items-center gap-2 text-slate-500 hover:text-indigo-600 text-sm font-semibold mb-6 transition-colors cursor-pointer group">
          <span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
          Voltar para Configurações
        </a>

        <div class="mb-8">
          <h1 class="text-2xl font-black text-slate-900 tracking-tight">Meu Perfil</h1>
          <p class="text-slate-500 text-base mt-1">Gerencie suas informações pessoais e senha.</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
          <div class="p-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
              
              <div class="space-y-8">
                
                <div class="flex items-center gap-6">
                  <div class="relative group">
                    <div class="w-24 h-24 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 text-3xl font-black shadow-inner">
                      LC
                    </div>
                    <div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                      <span class="material-symbols-outlined text-white">photo_camera</span>
                    </div>
                  </div>
                  <div class="space-y-2">
                    <h3 class="text-lg font-bold text-slate-900 leading-none">Foto de Perfil</h3>
                    <p class="text-sm text-slate-500">PNG ou JPG até 10MB</p>
                    <button class="px-4 py-1.5 border border-slate-300 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
                      Trocar foto
                    </button>
                  </div>
                </div>

                <div class="space-y-4 pt-4">
                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">Nome Completo</label>
                    <input class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none" type="text" value="Admin Loja Centro"/>
                  </div>
                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">E-mail</label>
                    <input class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none" type="email" value="admin@booka.com"/>
                  </div>
                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">Telefone/WhatsApp</label>
                    <input class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none" type="tel" value="(11) 99999-9999"/>
                  </div>
                </div>
              </div>

              <div class="space-y-6 lg:pl-12 lg:border-l border-slate-100">
                <div class="flex items-center gap-2 mb-2 border-b border-slate-100 pb-2">
                  <span class="material-symbols-outlined text-indigo-600">lock</span>
                  <h3 class="text-lg font-bold text-slate-900 leading-none">Alterar Senha</h3>
                </div>
                
                <div class="space-y-4">
                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">Senha Atual</label>
                    <input class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none" placeholder="••••••••" type="password"/>
                  </div>
                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">Nova Senha</label>
                    <input class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none" placeholder="Mínimo 8 caracteres" type="password"/>
                  </div>
                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">Confirmar Nova Senha</label>
                    <input class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none" placeholder="Repita a nova senha" type="password"/>
                  </div>
                </div>
                
                <div class="bg-indigo-50 rounded-xl p-4 mt-8 border border-indigo-100">
                  <div class="flex gap-3">
                    <span class="material-symbols-outlined text-indigo-600 text-[20px]">info</span>
                    <p class="text-sm text-indigo-800">
                      Para sua segurança, a senha deve conter letras maiúsculas, números e caracteres especiais.
                    </p>
                  </div>
                </div>
              </div>

            </div>
          </div>
          
          <div class="bg-slate-50 border-t border-slate-200 px-8 py-5 flex justify-end gap-3">
            <button class="px-6 py-2.5 text-sm font-bold text-slate-600 hover:text-slate-800 transition-colors">
              Cancelar
            </button>
            <button class="px-8 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-500/20 transition-all active:scale-95">
              Salvar Alterações
            </button>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
